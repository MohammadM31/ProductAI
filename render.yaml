services:
  - type: web
    name: productai
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    nodeVersion: 18.19.0
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_VISION_MODEL
        value: deepseek-vl
      - key: REPLICATE_API_KEY
        sync: false
      - key: OPENSEARCH_HOST
        sync: false
      - key: OPENSEARCH_USERNAME
        sync: false
      - key: OPENSEARCH_PASSWORD
        sync: false
      - key: OPENSEARCH_PORT
        value: 9200
      - key: OPENSEARCH_USE_SSL
        value: true
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: OPENAI_IMAGE_MODEL
        value: dall-e-2
      - key: REPLICATE_IMAGE_MODEL
        value: flux-schnell
      - key: PUBLIC_BASE_URL
        sync: false # ⚠️ MUST be set to your live backend URL, e.g. https://productai.onrender.com
                    # Without this, reference images get saved with an unreachable
                    # http://localhost:5000 URL and Replicate can't fetch them.